<div
  class="w-full min-w-[1024px] border border-cool-grey overflow-hidden shadow-lg shadow-black/20"
  role="grid"
  aria-label="Trading calendar"
>
  <div
    class="grid grid-cols-[repeat(7,1fr)_100px] bg-cool-grey/30 border-b border-cool-grey"
    role="row"
  >
    @for (header of weekdays; track header) {
      <div
        role="columnheader"
        class="py-4 text-center text-[10px] font-bold text-slate-500 tracking-[0.2em] uppercase"
      >
        {{ header }}
      </div>
    }
    <div
      role="columnheader"
      class="py-4 text-center text-[10px] font-bold text-primary tracking-[0.2em] uppercase bg-primary/5"
    >
      Weekly
    </div>
  </div>
  <div class="grid grid-cols-[repeat(7,1fr)_100px] gap-px bg-cool-grey">
    @for (week of weeks(); track $index) {
      <div role="row" class="contents">
        @for (slot of week; track $index) {
          <app-calendar-day-cell
            [day]="slot.day"
            [summary]="slot.dateKey ? dailySummaries()[slot.dateKey] : undefined"
            [currency]="currency()"
            [isToday]="slot.isToday"
            [isWeekend]="slot.isWeekend"
            (dayClick)="daySelected.emit($event)"
          />
        }
        <app-calendar-weekly-cell
          [netPL]="weeklyPnLs()[$index].netPL"
          [tradeCount]="weeklyPnLs()[$index].tradeCount"
          [currency]="currency()"
        />
      </div>
    }
  </div>
</div>
