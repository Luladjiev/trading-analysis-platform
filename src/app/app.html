<header class="border-b border-cool-grey">
  <div class="max-w-[1400px] mx-auto px-6 py-4 lg:px-12">
    <div class="flex items-center gap-6 text-slate-100">
      <h2 class="text-xl font-bold leading-tight tracking-tight uppercase">Trading Analysis Platform</h2>
      <nav class="flex gap-1 ml-auto" aria-label="Main navigation">
        <a
          routerLink="/"
          routerLinkActive="!text-primary"
          [routerLinkActiveOptions]="{ exact: true }"
          class="px-4 py-2 text-sm uppercase tracking-widest text-slate-400 hover:text-white transition-colors rounded"
        >Overview</a>
        <a
          routerLink="/calendar"
          routerLinkActive="!text-primary"
          class="px-4 py-2 text-sm uppercase tracking-widest text-slate-400 hover:text-white transition-colors rounded"
        >Calendar</a>
        <a
          routerLink="/cumulative-pnl"
          routerLinkActive="!text-primary"
          class="px-4 py-2 text-sm uppercase tracking-widest text-slate-400 hover:text-white transition-colors rounded"
        >Cumulative P/L</a>
      </nav>
    </div>
  </div>
</header>
<router-outlet />
