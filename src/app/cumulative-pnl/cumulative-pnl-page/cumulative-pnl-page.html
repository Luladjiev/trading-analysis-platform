<main class="flex flex-col flex-1 px-6 py-6 lg:px-12 max-w-[1400px] mx-auto w-full">
  <div class="flex flex-col md:flex-row justify-between items-start gap-6 mb-6">
    <app-calendar-header
      [monthLabel]="monthLabel()"
      [year]="currentYear()"
      [monthlyTotal]="monthlyTotal()"
      [currency]="currency"
    />
    <div class="flex gap-2">
      <button
        (click)="navigateMonth(-1)"
        aria-label="Previous month"
        class="flex items-center gap-2 px-5 py-2.5 bg-cool-grey/40 hover:bg-cool-grey/60 text-white text-xs font-bold uppercase tracking-widest transition-all border border-white/5 cursor-pointer"
      >
        &larr; Prev
      </button>
      <button
        (click)="navigateMonth(1)"
        aria-label="Next month"
        class="flex items-center gap-2 px-5 py-2.5 bg-cool-grey/40 hover:bg-cool-grey/60 text-white text-xs font-bold uppercase tracking-widest transition-all border border-white/5 cursor-pointer"
      >
        Next &rarr;
      </button>
    </div>
  </div>
  <app-pnl-chart
    [dailySummaries]="monthSummaries()"
    [previousMonthSummaries]="previousMonthSummaries()"
    [previousMonthLabel]="previousMonthLabel()"
    [currency]="currency"
    [monthLabel]="monthLabel() + ' ' + currentYear()"
    (daySelected)="selectedDaySummary.set($event)"
  />
  @if (selectedDaySummary()) {
    <app-trade-list-dialog
      [summary]="selectedDaySummary()!"
      [currency]="currency"
      (closed)="selectedDaySummary.set(null)"
    />
  }
</main>
